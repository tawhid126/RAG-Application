# Security Manual Assistant - Docker Compose Configuration
version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:6333/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Security Manual Assistant API
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: security-assistant
    ports:
      - "8000:8000"
    volumes:
      - ./data/manuals:/app/data/manuals
      - ./logs:/app/logs
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION_NAME=security_manuals
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=50
      - TOP_K_RESULTS=5
      - EMBEDDING_MODEL=text-embedding-3-small
      - CHAT_MODEL=gpt-4o-mini
      - MANUALS_DIR=/app/data/manuals
      - LOGS_DIR=/app/logs
      - LOG_LEVEL=INFO
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
    driver: local

networks:
  default:
    name: security-assistant-network
